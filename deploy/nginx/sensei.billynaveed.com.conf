# Routes sensei.billynaveed.com -> the news-sensei app (127.0.0.1:5000).
#
# Context: Cloudflare proxies *.billynaveed.com to this VPS (77.42.84.43). nginx
# here serves the personal billynaveed.com site as its DEFAULT vhost, so without
# this block the Host "sensei.billynaveed.com" falls through to that site (the
# homepage) instead of the app. An exact server_name match below fixes that.
#
# Install:
#   sudo cp deploy/nginx/sensei.billynaveed.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/sensei.billynaveed.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name sensei.billynaveed.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sensei.billynaveed.com;

    # TLS for the origin. Easiest options (Cloudflare is proxying in front):
    #   - reuse your existing *.billynaveed.com cert (if the default vhost has a
    #     wildcard cert, point to the same files), OR
    #   - a free Cloudflare Origin Certificate (covers *.billynaveed.com, 15yr) +
    #     set the Cloudflare SSL/TLS mode to "Full (strict)", OR
    #   - certbot --nginx -d sensei.billynaveed.com
    ssl_certificate     /etc/ssl/billynaveed/origin.pem;      # <-- adjust to your cert
    ssl_certificate_key /etc/ssl/billynaveed/origin.key;      # <-- adjust to your key

    # Optional but recommended behind Cloudflare: restore real client IPs.
    # include /etc/nginx/cloudflare-realip.conf;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;   # scans can hold a request open a while
    }
}
